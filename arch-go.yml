version: 1

# Thresholds for validation
threshold:
  compliance: 100 # All rules must pass
  coverage: 70 # At least 70% of packages must be covered by rules

# Exclude common directories from analysis
excludedPaths:
  - 'vendor/**'
  - '**/*_test.go'
  - '**/mocks/**'
  - '**/testdata/**'

# Architecture dependency rules - Clean Architecture enforcement
dependenciesRules:
  # Domain Layer (Innermost) - Pure business logic, NO external dependencies
  - package: '**.domain.**'
    shouldNotDependsOn:
      internal:
        - '**.application.**'
        - '**.ports'
        - '**.adapters.**'
        - '**.infra.**'
    description: 'Domain layer must be pure - no dependencies on outer layers'

  # Ports Layer - Interfaces that define contracts, only depends on domain
  - package: '**.ports'
    shouldOnlyDependsOn:
      internal:
        - '**.domain.**'
    description: 'Ports layer defines interfaces and only depends on domain'

  # Application Layer - Use cases/business operations, depends on domain and ports
  - package: '**.application'
    shouldOnlyDependsOn:
      internal:
        - '**.domain.**'
        - 'application.**'
        - '**.ports'
    description: 'Application layer depends on domain and ports only'

  # Inbound Adapters (Primary) - HTTP/gRPC handlers and event consumers
  - package: '**.adapters.inbound.**'
    shouldOnlyDependsOn:
      internal:
        - '**.application'
        - '**.domain.**'
        - '**.ports'
    description: 'Inbound adapters depend on application, domain, and ports only'

  # Outbound Adapters (Secondary) - Repositories, event publishers, external clients
  - package: '**.adapters.outbound.**'
    shouldOnlyDependsOn:
      internal:
        - '**.domain.**'
        - '**.ports'
    description: 'Outbound adapters implement ports, depend only on domain and ports'

  # Infrastructure Layer - Configuration and cross-cutting concerns
  - package: '**.infra.**'
    shouldOnlyDependsOn:
      internal:
        - '**.domain.**'
    description: 'Infrastructure layer should only depend on domain for type definitions'

  # Command Layer (Entry Points) - Can orchestrate and depend on everything
  - package: '**.cmd.**'
    shouldNotDependsOn:
      internal: []
    description: 'Command layer is entry point and can depend on all internal packages'

  # Root Package (Module Interface) - Exposes module to orchestrator
  - package: 'github.com/pivaldi/mmw-notifications'
    shouldNotDependsOn:
      internal: []
    description: 'Root package exposes module interface and can depend on all internal packages'
