# Mise configuration for Todo API project
# https://mise.jdx.dev/
[settings]
experimental = true
quiet = true

[tools]
go = "latest"
golangci-lint = "latest"
zellij = "latest"
# pinning a specific version is a strict best practice for mockery.
"go:github.com/vektra/mockery/v3" = "v3.7.0"

[shell_alias]
dev = "mise run run:dev"
build = "mise run build"
deploy = "mise run deploy"
r = "mise run"

[vars]
CONTRACTS_DIR = "{{config_root}}/../../contracts"
GOTESTSUM_OPTIONS = "--format testdox"
MIGRATIONS_DIR= "{{config_root}}/internal/infra/persistence/migrations/scripts"

# Environment variables
[env]
BINARY_NAME = "todo"
BINARY_PATH = "./cmd/todo"
BUILD_DIR = "bin"
_.file = ".envrc"  # Load .envrc file if it exists
APP_ENV = { required = true }
APP_NAME = { required = true }
DB_PASSWORD="postgres" # TODO: make it secret
DB_URL="postgres://postgres:{{env.DB_PASSWORD}}@localhost:5435/mmw?sslmode=disable"

[tasks.setup]
description = "Update Repo Deps"
run = """
#!/usr/bin/env bash
  set -euo pipefail

  cd {{config_root}} || exit 1
  source scripts/common/libs/st.bash

  st.h1 'Fix GOPRIVATE for this project'
  st.doing go env -w "GOPRIVATE=github.com/pivaldi/mmw-*"
  st.done

  st.h1 'Update Repo Deps'
  st.doing "Go Mod Tidy"
  st.do go mod tidy
  st.done
  st.doing "Go Mod Download"
  st.do go mod download
  st.done
  """

[tasks.tools]
description = "Install needed tools awares APP_ENV value"
run = "scripts/common/install-tools-ss.sh"

[tasks."tools:update"]
description = "Install/Update needed tools"
run = "UPDATE=true scripts/common/install-tools-ss.sh"


[tasks.pre-commit]
depends = ["arch:check"]
description = "Pre-commit checks (can be run manually or as git hook)"
run = "APP_ROOT_PATH={{config_root}} ./scripts/common/pre-commit.sh"
alias = "pc"

# Development tasks
[tasks."buf-deps"]
description = "Download buf dependencies"
run = """
cd {{vars.CONTRACTS_DIR}}
buf mod update
"""

[tasks.generate]
description = "Generate code from protobuf definitions and Go enums"
run = """
#!/usr/bin/env bash
  set -euo pipefail

  cd {{vars.CONTRACTS_DIR}}
  buf generate --template buf.gen.todo.yaml
  cd {{config_root}} || exit 1
  go generate ./...
 """

[tasks."generate:mocks"]
description = "Generate Go mocks for application ports"
run = "mockery"

[tasks."buf-lint"]
description = "Lint protobuf files (Todo API only)"
run = """
cd {{vars.CONTRACTS_DIR}}
buf lint proto/todo
"""

[tasks."buf-format"]
description = "Format protobuf files (Todo API only)"
run = """
cd {{vars.CONTRACTS_DIR}}
buf format -w proto/todo
"""

[tasks."buf-breaking"]
description = "Check for breaking changes in protobuf (Todo API only)"
run = """
cd {{vars.CONTRACTS_DIR}}
buf breaking --against '.git#branch=master' proto/todo
"""

[tasks.build]
description = "Build the application binary"
depends = ["generate"]
run = """
[ -e ${BUILD_DIR} ] || mkdir -p ${BUILD_DIR}
go build -o ${BUILD_DIR}/${BINARY_NAME} -v ${BINARY_PATH}
"""

[tasks."build-linux"]
description = "Build for Linux"
depends = ["generate"]
run = """
mkdir -p ${BUILD_DIR}
GOOS=linux GOARCH=amd64 go build -o ${BUILD_DIR}/${BINARY_NAME}-linux-amd64 -v ${BINARY_PATH}
"""

[tasks."build-darwin"]
description = "Build for macOS"
depends = ["generate"]
run = """
mkdir -p ${BUILD_DIR}
GOOS=darwin GOARCH=amd64 go build -o ${BUILD_DIR}/${BINARY_NAME}-darwin-amd64 -v ${BINARY_PATH}
GOOS=darwin GOARCH=arm64 go build -o ${BUILD_DIR}/${BINARY_NAME}-darwin-arm64 -v ${BINARY_PATH}
"""

[tasks.clean]
description = "Clean build artifacts"
run = """
go clean
rm -rf ${BUILD_DIR}
rm -rf gen/
"""

# Testing tasks
[tasks.test]
description = "Run unit tests"
run = "go tool gotestsum {{vars.GOTESTSUM_OPTIONS}} -- -v ./... ./..."

[tasks."test-coverage"]
description = "Run tests with coverage report"
run = """
go test -v -race -coverprofile=coverage.out ./...
go tool cover -html=coverage.out -o coverage.html || exit 1
echo "Coverage report generated: coverage.html"
"""

[tasks."test-integration"]
description = "Run integration tests (requires Docker for testcontainers)"
run = "go tool gotestsum {{vars.GOTESTSUM_OPTIONS}} -- -v -race -tags=integration ./internal/adapters/outbound/persistence/postgres/... ./test/integration/..."

[tasks."test-api"]
description = "Run API tests (requires running server)"
run = "go tool gotestsum {{vars.GOTESTSUM_OPTIONS}} -- -v -tags=api ./test/api/..."

[tasks."test-all"]
description = "Run all tests"
depends = ["test", "test-integration", "test-api"]

# Code quality tasks
[tasks.fmt]
description = "Format Go code"
run = "go fmt ./..."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.check]
description = "Run all checks (format, vet, lint)"
depends = ["fmt", "vet", "lint", "buf-lint"]

[tasks."arch:check"]
description = "Validate architecture boundaries for this service"
run = "arch-go"

[tasks."arch:graph"]
description = "Show graph architectural dependcies for this service"
run = """goda graph github.com/pivaldi/mmw/todo/... | dot -Tsvg -o graph.svg &&
  xdg-open graph.svg
 """

# Dependency tasks
[tasks."deps-tidy"]
description = "Tidy Go dependencies"
run = "go mod tidy"

[tasks.deps]
description = "Analyze dependencies with goda"
run = """
  echo "Analyzing workspace dependencies..."
  goda graph "./..." | dot -Tsvg -o graph.svg
  xdg-open graph.svg
"""

[tasks."deps:tree"]
description = "Show dependency tree"
run = """
echo "Dependency tree for workspace:"
goda tree "./..."
"""

[tasks."deps:list"]
description = "List all dependencies"
run = """
echo "All dependencies in workspace:"
goda list "./..."
"""

[tasks."deps:services"]
description = "Show dependencies between services and libs"
run = """
echo "Service dependencies:"
goda graph "./services/..."
echo ""
echo "Library dependencies:"
goda graph "./libs/..."
"""

[tasks."deps:verify"]
description = "Verify Go dependencies"
run = "go mod verify"

# Database tasks
[tasks."db:migrate:build"]
description = "Build the database migrations (needed to embed go migrations)"
# sources = ["cmd/migration/*.go", "{{config_root}}/internal/infra/persistence/migrations/scripts/*.go"]
run = """
  go build -o ${BUILD_DIR}/ cmd/migration/migrate.go &&
  ls -l ${BUILD_DIR}/migrate
"""

[tasks."db:migrate:up"]
# depends = ["db:migrate:build"]
description = "Run database migrations up"
run = "go run cmd/migration/migrate.go up"

[tasks."db:migrate:down"]
depends = ["db:migrate:build"]
description = "Run database migrations down"
run = "${BUILD_DIR}/migrate down"

[tasks."db:migrate:create"]
description = "Create new SQL/Go migration"
run = "go run cmd/migration/migrate.go create -d {{vars.MIGRATIONS_DIR}}"

[tasks."db:migrate:version"]
description = "Show current migration version"
run = "go run cmd/migration/migrate.go version"

[tasks."db:migrate:fix"]
description = "Fix the order of migrations"
run = "go run cmd/migration/migrate.go fix"

[tasks."db:migrate:reset"]
description = "Down all the migrations"
run = "go run cmd/migration/migrate.go reset"

[tasks."db:migrate:status"]
description = "Show current migration statud"
run = "go run cmd/migration/migrate.go status"

# Docker tasks
[tasks."docker:build"]
description = "Build Docker image"
run = "cd ../.. && docker build -t todo:latest -f services/todo/build/package/Dockerfile ."

[tasks."docker:up"]
description = "Start Docker Compose services"
run = "docker-compose -f deployments/docker-compose.yml up -d"

[tasks."docker:down"]
description = "Stop Docker Compose services"
run = "docker-compose -f deployments/docker-compose.yml down"

[tasks."docker:logs"]
description = "View Docker Compose logs"
run = "docker-compose -f deployments/docker-compose.yml logs -f"

# Running tasks
[tasks.run]
description = "Run the application"
depends = ["generate"]
run = "go run ${BINARY_PATH}/main.go"

[tasks."run:dev"]
description = "Run with hot reload (requires air)"
run = "go tool air"

[tasks."web:start"]
description = "Run with hot reload (requires air)"
run = "cd web/todoapp/ && npm install && npm start"

[tasks."zellif:dev"]
description = "Bootstrap the project with Zellij"
run = "zellij --layout third_party/zeillij/dev-layout.kdl"

# Default task (show help)
[tasks.default]
alias = "help"

[tasks.help]
description = "Display available tasks"
run = """
echo "Available tasks:"
mise tasks
"""

[tasks.doctor]
description = "Show tool versions and key environment info"
run = "{{config_root}}/scripts/common/doctor.sh"
alias = "dr"
